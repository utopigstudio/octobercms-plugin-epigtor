<div
    data-control="epigtor-richeditor"
    data-type="richeditor"
    data-instance-id="{{ __SELF__.instanceId }}"
    data-popup-url="{{ __SELF__.richeditorPopupUrl }}"
    data-message="{{ __SELF__.message }}"
    data-model="{{ __SELF__.model_class }}"
    data-id="{{ __SELF__.model_id }}"
    data-content-is-empty="{{ __SELF__.contentIsEmpty ? 'true' : 'false' }}"
    data-show-empty="false">
    <div class="rendered">{{ __SELF__.content|content }}</div>
    <div class="unrendered" style="display:none">{{ __SELF__.content|raw }}</div>
</div>
